<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ページが見つかりません | にっしー＆かっほー幼児園</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Zen+Maru+Gothic:wght@500;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Zen Maru Gothic", system-ui, sans-serif;
    background: #FFF9F0;
    color: #3E3A36;
    min-height: 100vh;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 24px;
  }
  .tag {
    font-family: "Caveat", cursive;
    font-size: 1.8rem;
    color: #E08840;
    margin-bottom: 16px;
  }
  h1 {
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 900;
    margin-bottom: 12px;
  }
  p {
    font-size: 1rem;
    line-height: 1.9;
    margin-bottom: 32px;
    color: #6B655E;
  }
  a {
    display: inline-block;
    padding: 14px 36px;
    background: #F5A65B;
    color: #FFF;
    text-decoration: none;
    border-radius: 100px;
    font-weight: 700;
    box-shadow: 0 8px 20px rgba(245, 166, 91, .35);
    transition: transform .3s;
  }
  a:hover { transform: translateY(-2px); }
</style>
</head>
<body>
<div>
  <p class="tag">Oops...</p>
  <h1>404</h1>
  <p>お探しのページは見つかりませんでした。<br>URLが正しいかご確認ください。</p>
  <a href="/">トップへもどる</a>
</div>
</body>
</html>
